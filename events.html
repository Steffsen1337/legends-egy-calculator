<html lang="en">

  <script>
    (function() {
      if (window.location.protocol === 'file:') return;
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') return;
      if (window.location.hostname.includes('.local')) return;
      if (location.protocol !== 'https:') {
        location.href = 'https:' + location.href.substring(location.protocol.length);
      }
    })();
  </script>

  <style>
    .wrap { padding-top: 100px !important; }

    .events-container { margin-top: 20px; }
    
    .server-time {
      text-align: center;
      padding: 16px;
      margin-bottom: 20px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      transition: background .4s ease, border-color .4s ease;
    }
    .server-time .label { color: var(--muted); font-size: 13px; }
    .server-time .time {
      font-size: 32px;
      font-weight: 900;
      color: var(--accent2);
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
    }

    /* ===== EVENTS GRID ===== */
    .events-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 30px;
    }

    .event-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow-sm);
      transition: background .4s ease, border-color .4s ease;
    }
    [data-theme="light"] .event-card { border-color: rgba(0,0,0,.06); }

    .event-card .event-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .event-card .event-name .icon { font-size: 20px; }

    .event-card .event-times {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .event-card .event-times .time-badge {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      background: var(--item-bg);
      border: 1px solid var(--line);
      transition: background .4s ease, border-color .4s ease;
    }

    .event-card .event-times .time-badge.active {
      background: rgba(110,231,183,.20);
      border-color: rgba(110,231,183,.30);
      color: var(--success);
      animation: pulse-active 1.5s ease-in-out infinite;
    }

    .event-card .event-times .time-badge.passed {
      opacity: 0.35;
    }

    .event-card .event-next {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .event-card .event-next .highlight {
      color: var(--warn);
      font-weight: 600;
    }

    .event-card .event-note {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      opacity: 0.7;
    }

    @keyframes pulse-active {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.98); }
    }

    /* ===== SORTED LIST ===== */
    .sorted-section {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 2px solid var(--line);
    }

    .sorted-section h2 {
      font-size: 18px;
      margin-bottom: 12px;
    }

    .sorted-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .sorted-table th {
      text-align: left;
      padding: 10px 12px;
      color: var(--muted);
      font-weight: 600;
      border-bottom: 2px solid var(--line);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .sorted-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      transition: border-color .4s ease;
    }

    .sorted-table tr:hover td {
      background: var(--item-bg-hover);
    }

    .sorted-table .event-name-cell {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sorted-table .event-name-cell .icon {
      font-size: 16px;
    }

    .sorted-table .status-cell {
      font-weight: 600;
    }

    .sorted-table .status-cell.active {
      color: var(--success);
    }

    .sorted-table .status-cell.soon {
      color: var(--warn);
    }

    .sorted-table .status-cell.upcoming {
      color: var(--accent2);
    }

    .sorted-table .time-cell {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .sorted-table .time-cell.soon {
      color: var(--warn);
    }

    .sorted-table .time-cell.active {
      color: var(--success);
    }

    @media (max-width: 768px) {
      .events-grid { grid-template-columns: 1fr; gap: 12px; }
      .server-time .time { font-size: 24px; }
      
      .sorted-table {
        font-size: 12px;
      }
      .sorted-table th,
      .sorted-table td {
        padding: 6px 8px;
      }
      .sorted-table .event-name-cell .icon {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="menuContainer"></div>

  <div class="wrap" role="main">
    <header class="hero">
      <div class="hero-left">
        <h1>Event Timer</h1>
        <p class="lead">Server time and event countdowns for <strong>Legends Online</strong>.</p>
      </div>
      <div class="hero-actions"></div>
    </header>

    <div class="events-container" id="eventsContainer">
      <!-- Server Time -->
      <div class="server-time">
        <div class="label">🕐 Server Time (UTC/GMT+3)</div>
        <div class="time" id="serverTime">--:--:--</div>
      </div>

      <!-- Events Grid -->
      <div class="events-grid" id="eventsGrid"></div>

      <!-- Sorted List -->
      <div class="sorted-section" id="sortedSection">
        <h2>📋 Upcoming Events (sorted by time)</h2>
        <div id="sortedListContainer"></div>
      </div>
    </div>
  </div>

  <script src="menu.js"></script>
  <script>
    // ============================================================
    //  EVENTS DATA
    // ============================================================
    const EVENTS = [
      { 
        name: 'Capture The Flag', 
        icon: '🏴', 
        times: ['01:00', '05:00', '09:00', '13:00', '17:00', '21:00'], 
        days: [0, 1, 2, 3, 4, 5, 6],
        note: '' 
      },
      {

        icon: '⚔️', 
        times: ['04:00', '08:00', '16:00'], 
        days: [0, 1, 2, 3, 4, 5, 6],
        note: '' 
      },
      { 
        name: 'Battle Arena (Flag)', 
        icon: '⚔️', 
        times: ['12:00', '20:00'], 
        days: [0, 1, 2, 3, 4, 5, 6],
        note: '' 
      },
      { 
        name: 'Survival Arena', 
        icon: '🏟️', 
        times: ['23:00', '11:00'], 
        days: [0, 1, 2, 3, 4, 5, 6],
        note: '' 
      },
      { 
        name: 'Special Goods Time', 
        icon: '🛒', 
        times: ['09:30', '15:30', '21:30'], 
        days: [0, 1, 2, 3, 4, 5, 6],
        note: '' 
      },
      { 
        name: 'Last Man Standing', 
        icon: '👑', 
        times: ['23:30', '11:30'], 
        days: [0, 1, 2, 3, 4, 5, 6],
        note: '' 
      },
      { 
        name: 'War of Leagues', 
        icon: '⚔️', 
        times: ['19:30'], 
        days: [0, 1, 2, 3, 4, 5, 6],
        note: '' 
      },
      { 
        name: 'Selketh & Neith', 
        icon: '👹', 
        times: ['06:30', '12:30', '18:30'], 
        days: [0, 1, 2, 3, 4, 5, 6],
        skipTimesOnDays: { 0: ['18:30'] },
        note: '18:30 not available on Sundays' 
      },
      { 
        name: 'Isis & Anubis', 
        icon: '👹', 
        times: ['07:30', '14:30', '20:30'], 
        days: [0, 1, 2, 3, 4, 5, 6],
        skipTimesOnDays: { 0: ['20:30'] },
        note: '20:30 not available on Sundays' 
      },
      { 
        name: 'Tower Defense', 
        icon: '🗼', 
        times: ['17:30'], 
        days: [5, 6, 0],
        note: 'Friday, Saturday, Sunday only' 
      },
      { 
        name: 'Beakyung The White Viper', 
        icon: '🐍', 
        times: ['21:30'], 
        days: [5],
        note: 'Friday only' 
      },
      { 
        name: 'The Roc', 
        icon: '🦅', 
        times: ['21:30'], 
        days: [6],
        note: 'Saturday only' 
      },
      { 
        name: 'Haroesis & Seth', 
        icon: '👹', 
        times: ['18:30'], 
        days: [0],
        note: 'Sunday only' 
      },
      { 
        name: 'Guild Wars', 
        icon: '⚔️', 
        times: ['20:30'], 
        days: [0],
        note: 'Sunday only' 
      },
      { 
        name: 'Fortress War', 
        icon: '🏰', 
        times: ['21:30'], 
        days: [0],
        note: 'Sunday only' 
      }
    ];

    // ============================================================
    //  HELPERS
    // ============================================================
    const TIMEZONE_OFFSET = 3;
    const MINUTE_MS = 60000;

    function getServerTime() {
      const now = new Date();
      const utc = now.getTime() + now.getTimezoneOffset() * MINUTE_MS;
      return new Date(utc + TIMEZONE_OFFSET * 3600000);
    }

    function getServerTimeStr() {
      return getServerTime().toTimeString().slice(0, 8);
    }

    function getCurrentMinutes() {
      const t = getServerTime();
      return t.getHours() * 60 + t.getMinutes();
    }

    function getCurrentDay() {
      return getServerTime().getDay();
    }

    function parseTimeToMinutes(timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      return h * 60 + m;
    }

    function getAvailableTimesForEvent(event) {
      const currentDay = getCurrentDay();
      const skipTimes = event.skipTimesOnDays ? event.skipTimesOnDays[currentDay] || [] : [];
      return event.times.filter(time => !skipTimes.includes(time));
    }

    function getNextEventTime(event) {
      const current = getCurrentMinutes();
      const currentDay = getCurrentDay();
      
      let best = null;
      let bestDiff = Infinity;

      for (let dayOffset = 0; dayOffset <= 7; dayOffset++) {
        const checkDay = (currentDay + dayOffset) % 7;
        if (!event.days.includes(checkDay)) continue;
        
        const skipTimes = event.skipTimesOnDays ? event.skipTimesOnDays[checkDay] || [] : [];
        const timesForDay = event.times.filter(time => !skipTimes.includes(time));
        
        if (timesForDay.length === 0) continue;
        
        for (const time of timesForDay) {
          const target = parseTimeToMinutes(time);
          let diff = target - current;
          if (dayOffset > 0) {
            diff += dayOffset * 1440;
          } else if (dayOffset === 0 && diff < 0) {
            continue;
          }
          
          if (diff >= 0 && diff < bestDiff) {
            bestDiff = diff;
            best = { time, diff, target, day: checkDay, dayOffset };
          }
        }
      }

      return best;
    }

    function isEventAvailableToday(event) {
      const currentDay = getCurrentDay();
      if (!event.days.includes(currentDay)) return false;
      const availableTimes = getAvailableTimesForEvent(event);
      return availableTimes.length > 0;
    }

    function getDayName(day) {
      const names = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      return names[day];
    }

    // ============================================================
    //  KORRIGIERTE formatTime-Funktion (einheitlich)
    // ============================================================
    function formatTime(diff) {
      if (diff === 0) return 'NOW!';
      if (diff < 0) return 'Passed';
      
      const totalMinutes = diff;
      const days = Math.floor(totalMinutes / 1440);
      const hours = Math.floor((totalMinutes % 1440) / 60);
      const minutes = totalMinutes % 60;
      
      if (days === 0 && hours === 0) {
        return `${minutes}m`;
      }
      if (days === 0) {
        return `${hours}h ${minutes}m`;
      }
      if (days === 1) {
        return `1d ${hours}h ${minutes}m`;
      }
      return `${days}d ${hours}h ${minutes}m`;
    }

    function getStatus(diff) {
      if (diff <= 5) return { label: '🔴 NOW!', class: 'active' };
      if (diff <= 60) return { label: 'Soon', class: 'soon' };
      return { label: 'Upcoming', class: 'upcoming' };
    }

    // ============================================================
    //  RENDER
    // ============================================================
    function renderEvents() {
      const grid = document.getElementById('eventsGrid');
      grid.innerHTML = '';

      // Sammle alle Events mit ihren nächsten Zeiten für die sortierte Liste
      const sortedEvents = [];

      EVENTS.forEach(event => {
        const card = document.createElement('div');
        card.className = 'event-card';

        const availableToday = isEventAvailableToday(event);
        const next = getNextEventTime(event);
        const availableTimes = getAvailableTimesForEvent(event);

        let nameHTML = `<span class="icon">${event.icon}</span> ${event.name}`;
        if (!availableToday) {
          nameHTML += ` <span style="font-size:11px;color:var(--muted);opacity:0.5;">(Not available today)</span>`;
        }

        // Times
        let timesHTML = '';
        const current = getCurrentMinutes();
        const currentDay = getCurrentDay();
        const isToday = event.days.includes(currentDay);
        
        event.times.forEach(time => {
          const target = parseTimeToMinutes(time);
          let diff = target - current;
          const isSkipped = event.skipTimesOnDays && event.skipTimesOnDays[currentDay] && event.skipTimesOnDays[currentDay].includes(time);
          
          let isActive = false;
          if (isToday && !isSkipped && diff >= 0 && diff <= 5) isActive = true;
          if (isToday && diff < 0) diff += 1440;

          let cls = 'time-badge';
          if (isActive) cls += ' active';
          else if (!isToday || isSkipped) cls += ' passed';

          let label = time;
          if (isActive) label = `🔴 ${time} (NOW!)`;
          if (isSkipped) label = `${time} (skipped today)`;

          timesHTML += `<span class="${cls}">${label}</span>`;
        });

        // Next event
        let nextHTML = '';
        if (next) {
          const diff = next.diff;
          const isNow = diff <= 5;
          const hours = Math.floor(diff / 60);
          const minutes = diff % 60;
          const days = Math.floor(hours / 24);

          let label = '';
          if (isNow) {
            label = '🔴 Starts now!';
          } else if (days === 1 && hours < 24) {
            const remHours = hours % 24;
            label = `Tomorrow at ${remHours}h ${minutes}m`;
          } else if (days === 0 && hours === 0) {
            label = `Starts in ${minutes}m`;
          } else if (days === 0 && hours < 24) {
            label = `Starts in ${hours}h ${minutes}m`;
          } else {
            const remHours = hours % 24;
            label = `Starts in ${days}d ${remHours}h ${minutes}m`;
          }

          const dayName = next.dayOffset === 0 ? 'Today' : getDayName(next.day);
          nextHTML = `
            <div class="event-next">
              Next: <span class="highlight">${next.time}</span> (${dayName}) — ${label}
            </div>
          `;
        }

        card.innerHTML = `
          <div class="event-name">${nameHTML}</div>
          <div class="event-times">${timesHTML}</div>
          ${nextHTML}
          ${event.note ? `<div class="event-note">${event.note}</div>` : ''}
        `;
        grid.appendChild(card);

        // Für die sortierte Liste speichern (nur wenn Event verfügbar ist)
        if (next) {
          sortedEvents.push({
            event: event,
            next: next,
            diff: next.diff
          });
        }
      });

      // ===== SORTIERTE LISTE RENDERN =====
      sortedEvents.sort((a, b) => a.diff - b.diff);

      const container = document.getElementById('sortedListContainer');
      if (sortedEvents.length === 0) {
        container.innerHTML = '<p style="color:var(--muted);">No upcoming events found.</p>';
        return;
      }

      let tableHTML = `
        <table class="sorted-table">
          <thead>
            <tr>
              <th>Event</th>
              <th>Next Time</th>
              <th>Status</th>
              <th>Remaining</th>
            </tr>
          </thead>
          <tbody>
      `;

      sortedEvents.forEach(({ event, next, diff }) => {
        const status = getStatus(diff);
        const dayName = next.dayOffset === 0 ? 'Today' : getDayName(next.day);
        const timeDisplay = `${next.time} (${dayName})`;
        
        tableHTML += `
          <tr>
            <td>
              <span class="event-name-cell">
                <span class="icon">${event.icon}</span>
                ${event.name}
              </span>
            </td>
            <td class="time-cell">${timeDisplay}</td>
            <td class="status-cell ${status.class}">${status.label}</td>
            <td class="time-cell ${status.class}">${formatTime(diff)}</td>
          </tr>
        `;
      });

      tableHTML += `
          </tbody>
        </table>
      `;

      container.innerHTML = tableHTML;
    }

    function updateServerTime() {
      document.getElementById('serverTime').textContent = getServerTimeStr();
    }

    // ============================================================
    //  MENU & INIT
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof renderMenu === 'function') {
        renderMenu('events');
      }

      updateServerTime();
      renderEvents();

      setInterval(updateServerTime, 1000);
      setInterval(renderEvents, 60000);
    });
  </script>
</body>
</html>
