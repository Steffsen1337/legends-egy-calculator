<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unique History – Legends Online</title>
    <!-- Zentrale Styles einbinden -->
    <link rel="stylesheet" href="menu.css" />
    <link rel="stylesheet" href="main.css" />
    <!-- Kleine, seiten-spezifische Anpassungen -->
    <style>
        /* History-Einträge wie die Items in main.css */
        .history-entry {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 10px;
            background: var(--item-bg);
            border: 1px solid var(--line);
            transition: background var(--transition), border-color var(--transition);
        }
        .history-entry:hover {
            background: var(--item-bg-hover);
            border-color: var(--line-hover);
        }
        .history-entry .monster {
            font-weight: 500;
            flex: 1;
            color: var(--text);
        }
        .history-entry .killer {
            color: var(--muted);
            font-size: 0.9rem;
        }
        .history-entry .killer a {
            color: var(--accent);
            text-decoration: none;
        }
        .history-entry .killer a:hover {
            text-decoration: underline;
        }
        .history-entry .time {
            color: var(--muted);
            font-size: 0.8rem;
            background: var(--input-bg);
            padding: 2px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .history-empty {
            color: var(--muted);
            text-align: center;
            padding: 20px 0;
        }
        .history-meta {
            font-size: 0.8rem;
            color: var(--muted);
            text-align: right;
            border-top: 1px solid var(--line);
            padding-top: 12px;
            margin-top: 12px;
        }
        .history-loading {
            color: var(--muted);
            text-align: center;
            padding: 20px 0;
        }
        .panel-body .history-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .update-badge {
            font-size: 0.75rem;
            color: var(--muted);
            background: var(--input-bg);
            padding: 2px 12px;
            border-radius: 20px;
            border: 1px solid var(--line);
        }
        /* Für den Aktualisierungs-Pill im Hero */
        .pill .update-time {
            font-weight: 600;
            color: var(--text);
        }
    </style>
</head>
<body>

    <!-- Menü-Container (wird von menu.js befüllt) -->
    <div id="menuContainer"></div>

    <!-- Hauptinhalt im .wrap (Abstand zum fixen Menü) -->
    <div class="wrap">
        <div class="hero">
            <div class="hero-left">
                <h1>⚔️ Unique History</h1>
                <p class="lead">Die letzten besiegten Bosse – live aus dem Spiel.</p>
            </div>
            <div class="hero-actions">
                <span class="pill" id="lastUpdate">🔄 lädt…</span>
            </div>
        </div>

        <!-- Panel für die History-Liste -->
        <div class="panel">
            <div class="panel-head">
                <h2>Letzte Kills</h2>
                <span class="sub" id="metaInfo">—</span>
            </div>
            <div class="panel-body">
                <div id="historyContent" class="history-list">
                    <div class="history-loading">Daten werden geladen …</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Menü-Script -->
    <script src="menu.js"></script>

    <script>
        // Menü rendern mit active='history'
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof renderMenu === 'function') {
                renderMenu('history');
            } else {
                console.warn('menu.js nicht geladen');
            }
        });

        // Daten laden und anzeigen
        fetch('unique_history.json')
            .then(res => {
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            })
            .then(data => {
                const container = document.getElementById('historyContent');
                const meta = document.getElementById('metaInfo');
                const update = document.getElementById('lastUpdate');

                if (!data.kills || data.kills.length === 0) {
                    container.innerHTML = '<div class="history-empty">Keine Einträge gefunden.</div>';
                    meta.textContent = '';
                    update.innerHTML = '📭 keine Daten';
                    return;
                }

                // Einträge rendern
                let html = '';
                data.kills.forEach(k => {
                    const killerLink = k.killer_url
                        ? `<a href="https://playlegends.online${k.killer_url}" target="_blank">${k.killer}</a>`
                        : k.killer || 'unbekannt';
                    html += `
                        <div class="history-entry">
                            <span class="monster">${k.monster}</span>
                            <span class="killer">getötet von ${killerLink}</span>
                            <span class="time">${k.time_ago}</span>
                        </div>
                    `;
                });

                container.innerHTML = html;

                // Metadaten
                const scraped = new Date(data.scraped_at).toLocaleString('de-DE', { timeZone: 'UTC' });
                meta.textContent = `${data.total} Einträge · Stand: ${scraped} UTC`;
                update.innerHTML = `🔄 <span class="update-time">${scraped}</span>`;
            })
            .catch(err => {
                document.getElementById('historyContent').innerHTML =
                    `<div class="history-empty">Fehler beim Laden der History: ${err.message}</div>`;
                document.getElementById('metaInfo').textContent = '';
                document.getElementById('lastUpdate').innerHTML = '❌ Fehler';
            });
    </script>
</body>
</html>
