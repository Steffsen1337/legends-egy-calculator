<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

      if (location.protocol !== 'https:') {
        location.href = 'https:' + location.href.substring(location.protocol.length);
      }
    })();

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/menu.css" />
  
  <style>
    .wrap { padding-top: 100px !important; }
    
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 16px;
    }
    .compare-col .panel-head h3 {
      margin: 0;
      font-size: 16px;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .badge-a {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 999px;
      background: rgba(124,156,255,.20);
      color: var(--accent2);
      border: 1px solid rgba(124,156,255,.20);
    }
    .badge-b {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 999px;
      background: rgba(251,191,36,.20);
      color: var(--warn);
      border: 1px solid rgba(251,191,36,.20);
    }
    .compare-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 8px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      transition: border-color .4s ease;
    }
    .compare-item:last-child { border-bottom: none; }
    .compare-item .label { color: var(--muted); }
    .compare-item .value { font-weight: 600; }
    .compare-item .value.gold { color: #ffd966; }
    [data-theme="light"] .compare-item .value.gold { color: #b8860b; }
    .compare-sub-item {
      padding-left: 16px;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      padding-top: 4px;
      padding-bottom: 4px;
    }
    .compare-sub-item .label { opacity: 0.7; }
    .compare-sub-item .value { font-weight: 500; }
    .compare-sub-item .value.gold { color: #ffd966; }
    [data-theme="light"] .compare-sub-item .value.gold { color: #b8860b; }
    .compare-total {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 2px solid var(--line);
      font-size: 15px;
      font-weight: 700;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .compare-total .total-row { display: flex; justify-content: space-between; }
    .compare-total .total-row .value { font-size: 16px; }
    .compare-total .total-row .value.gold { color: #ffd966; }
    [data-theme="light"] .compare-total .total-row .value.gold { color: #b8860b; }
    .compare-diff {
      margin-top: 20px;
      padding: 16px;
      border-radius: var(--radius);
      background: var(--item-bg);
      border: 1px solid var(--line);
      text-align: center;
      transition: background .4s ease, border-color .4s ease;
    }
    [data-theme="light"] .compare-diff { border-color: rgba(0,0,0,.06); }
    .compare-diff .label { color: var(--muted); font-size: 13px; }
    .compare-diff .value { font-size: 28px; font-weight: 900; margin-top: 4px; }
    .compare-diff .value.positive { color: var(--danger); }
    .compare-diff .value.negative { color: var(--success); }
    .compare-diff .value.neutral { color: var(--muted); }
    .compare-diff .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .compare-diff .diff-currencies {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .compare-diff .diff-currencies .diff-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    @media (max-width: 768px) {
      .compare-grid { grid-template-columns: 1fr; gap: 12px; }
    }
  </style>
</head>
<body>
  <div id="menuContainer"></div>

  <div class="wrap" role="main">
    <div id="appContent"></div>
  </div>

  <script src="data/items.js"></script>
  <script src="data/groups.js"></script>
  <script src="menu.js"></script>
  <script>
    // ============================================================
    //  COMPARE LOGIC (direkt in compare.html)
    // ============================================================

    // ===== THEME =====
    function applyTheme() {
      let theme = 'dark';
      try {
        const saved = localStorage.getItem('egy_theme');
        if (saved) theme = saved;
      } catch (_) {}
      document.documentElement.setAttribute('data-theme', theme);
    }
    applyTheme();

    // ===== MENU =====
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof renderMenu === 'function') {
        renderMenu('compare');
      }
    });

    // ===== UTILITY =====
    const fmt = n => new Intl.NumberFormat('de-DE').format(n || 0);

    function getItemsByCategory(cat) {
      return Object.values(ITEMS).filter(i => i.cat === cat);
    }

    function sumCurrencies(items) {
      let gold = 0, sc = 0, lsc = 0, gc = 0, lgc = 0;
      items.forEach(item => {
        gold += item.gold || 0;
        sc += item.sc || 0;
        lsc += item.lsc || 0;
        gc += item.gc || 0;
        lgc += item.lgc || 0;
      });
      return { gold, sc, lsc, gc, lgc };
    }

    // ===== COMPARE LOGIC =====
    function renderComparison() {
      const egyAItems = getItemsByCategory('Nova/Egy A');
      const egyAFiltered = egyAItems.filter(i => i.group !== 'weapon_shield');

      const upgradeItems = getItemsByCategory('Upgrade Nova/Egy A → B');
      const upgradeFiltered = upgradeItems.filter(i => i.group !== 'weapon_shield');

      const egyBItems = getItemsByCategory('Nova/Egy B');
      const egyBFiltered = egyBItems.filter(i => i.group !== 'weapon_shield');

      const egyASum = sumCurrencies(egyAFiltered);
      const upgradeSum = sumCurrencies(upgradeFiltered);
      const egyBSum = sumCurrencies(egyBFiltered);

      const egyATotal = {
        gold: egyASum.gold + upgradeSum.gold,
        sc: egyASum.sc + upgradeSum.sc,
        lsc: egyASum.lsc + upgradeSum.lsc,
        gc: egyASum.gc + upgradeSum.gc,
        lgc: egyASum.lgc + upgradeSum.lgc
      };

      // ===== RENDER =====
      const container = document.getElementById('appContent');
      if (!container) return;

      let html = `
        <header class="hero">
          <div class="hero-left">
            <h1>Egy A vs Egy B Comparison</h1>
            <p class="lead">Compare the total costs of <strong>Nova/Egy A</strong> (including Upgrade) and <strong>Nova/Egy B</strong> side by side.</p>
            <span class="note-badge">⚠️ Weapon & Shield (Egy B) only via FGW / LHWT</span>
          </div>
          <div class="hero-actions"></div>
        </header>
        <div class="compare-grid">
          <div class="compare-col panel">
            <div class="panel-head"><h3><span>Nova/Egy A + Upgrade</span><span class="badge-a">Destruction → Immortal / Myth → Legend</span></h3></div>
            <div class="panel-body">
              <div id="egyAItems"></div>
              <div class="compare-total">
                <div class="total-row"><span>Total Gold</span><span class="value gold">${fmt(egyATotal.gold)}</span></div>
                <div class="total-row" style="font-weight:400;font-size:13px;color:var(--muted);"><span>SC</span>${fmt(egyATotal.sc)}</div>
                <div class="total-row" style="font-weight:400;font-size:13px;color:var(--muted);"><span>LSC</span>${fmt(egyATotal.lsc)}</div>
                <div class="total-row" style="font-weight:400;font-size:13px;color:var(--muted);"><span>GC</span>${fmt(egyATotal.gc)}</div>
                <div class="total-row" style="font-weight:400;font-size:13px;color:var(--muted);"><span>LGC</span>${fmt(egyATotal.lgc)}</div>
              </div>
            </div>
          </div>
          <div class="compare-col panel">
            <div class="panel-head"><h3><span>Nova/Egy B</span><span class="badge-b">Immortal / Legend</span></h3></div>
            <div class="panel-body">
              <div id="egyBItems"></div>
              <div class="compare-total">
                <div class="total-row"><span>Total Gold</span><span class="value gold">${fmt(egyBSum.gold)}</span></div>
                <div class="total-row" style="font-weight:400;font-size:13px;color:var(--muted);"><span>SC</span>${fmt(egyBSum.sc)}</div>
                <div class="total-row" style="font-weight:400;font-size:13px;color:var(--muted);"><span>LSC</span>${fmt(egyBSum.lsc)}</div>
                <div class="total-row" style="font-weight:400;font-size:13px;color:var(--muted);"><span>GC</span>${fmt(egyBSum.gc)}</div>
                <div class="total-row" style="font-weight:400;font-size:13px;color:var(--muted);"><span>LGC</span>${fmt(egyBSum.lgc)}</div>
              </div>
            </div>
          </div>
        </div>
        <div class="compare-diff">
          <div class="label">💰 Price Difference (Egy B - Egy A+Upgrade)</div>
          <div class="value ${egyBSum.gold > egyATotal.gold ? 'positive' : 'negative'}">${fmt(Math.abs(egyBSum.gold - egyATotal.gold))}</div>
          <div class="sub">${egyBSum.gold > egyATotal.gold ? `Egy B is ${fmt(egyBSum.gold - egyATotal.gold)} more expensive than Egy A + Upgrade` : `Egy B is ${fmt(egyATotal.gold - egyBSum.gold)} cheaper than Egy A + Upgrade`}</div>
          <div class="diff-currencies">
            <span class="diff-item"><span class="coin sc">SC</span> ${fmt(Math.abs(egyBSum.sc - egyATotal.sc))}</span>
            <span class="diff-item"><span class="coin lsc">LSC</span> ${fmt(Math.abs(egyBSum.lsc - egyATotal.lsc))}</span>
            <span class="diff-item"><span class="coin gc">GC</span> ${fmt(Math.abs(egyBSum.gc - egyATotal.gc))}</span>
            <span class="diff-item"><span class="coin lgc">LGC</span> ${fmt(Math.abs(egyBSum.lgc - egyATotal.lgc))}</span>
          </div>
        </div>
      `;

      container.innerHTML = html;

      // ===== EGY A ITEMS =====
      const egyAContainer = document.getElementById('egyAItems');
      if (egyAContainer) {
        egyAFiltered.forEach(item => {
          const div = document.createElement('div');
          div.className = 'compare-item';
          div.innerHTML = `<span class="label">${item.setTag ? `${item.name} (${item.setTag})` : item.name}</span><span class="value gold">${fmt(item.gold)}</span>`;
          egyAContainer.appendChild(div);
        });

        const sep = document.createElement('div');
        sep.className = 'compare-item';
        sep.style.borderBottom = '2px solid var(--line)';
        sep.style.padding = '2px 0';
        sep.style.margin = '4px 0';
        sep.innerHTML = `<span style="color:var(--muted);font-size:11px;">+ Upgrade Costs</span>`;
        egyAContainer.appendChild(sep);

        upgradeFiltered.forEach(item => {
          const div = document.createElement('div');
          div.className = 'compare-sub-item';
          div.innerHTML = `<span class="label">↗ ${item.name}</span><span class="value gold">${fmt(item.gold)}</span>`;
          egyAContainer.appendChild(div);
        });
      }

      // ===== EGY B ITEMS =====
      const egyBContainer = document.getElementById('egyBItems');
      if (egyBContainer) {
        egyBFiltered.forEach(item => {
          const div = document.createElement('div');
          div.className = 'compare-item';
          div.innerHTML = `<span class="label">${item.setTag ? `${item.name} (${item.setTag})` : item.name}</span><span class="value gold">${fmt(item.gold)}</span>`;
          egyBContainer.appendChild(div);
        });

        const note = document.createElement('div');
        note.className = 'compare-item';
        note.style.color = 'var(--warn)';
        note.style.fontSize = '12px';
        note.style.opacity = '0.7';
        note.innerHTML = `<span class="label">⚠️ Weapon & Shield</span><span>only via FGW / LHWT</span>`;
        egyBContainer.appendChild(note);
      }
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', renderComparison);
  </script>
</body>
</html>
