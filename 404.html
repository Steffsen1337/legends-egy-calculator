<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0;url=/legends-egy-calculator/">
  <title>Redirecting...</title>
  <script>
    (function() {
      var path = window.location.pathname;
      var base = '/legends-egy-calculator/';
      
      if (path.includes('/compare')) {
        window.location.href = base + 'compare';
      } else {
        window.location.href = base;
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
